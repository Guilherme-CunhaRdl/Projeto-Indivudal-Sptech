<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./css/perfil.css" />
        <link rel="stylesheet" href="./css/nav.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        />
        <title>Biblioteca do Howl - Perfil</title>
    </head>
    <body>
        <div id="navbar"></div>
        <div class="div_container">
            <div class="div_banner">
                <img src="./assets/ChihiroBanner.jpg" class="ImgBanner" id="banner_usuario" />

                <div class="div_infoUsuario">
                    <img src="./assets/HakuIcon.webp" class="imgPerfil" id="img_usuario" />

                    <div class="div_dados">
                        <h1 id="nome_Usuario">GUILHERME CUNHA</h1>

                        <div class="div_email">
                            <i class="bi bi-envelope"></i> <span id="email_usuario"> guilherme@gmail.com</span> 
                        </div>
                        <div class="div_membro">
                            <span>Membro desde:</span> <span id="dtCad_usuario"> guilherme@gmail.com</span> 
                        </div>
                    </div>
                </div>

                <div class="div_btnEditar">
                    <button class="btnTemas">
                        <i class="bi bi-palette"></i>
                    </button>

                    <button class="btnEditarPerfil">
                        <i class="bi bi-pencil-fill"></i> EDITAR PERFIL
                    </button>
                </div>
            </div>

            <div class="div_dadosUsuario">
                <div class="div_estaticas">
                    <h1>ESTATISTICAS</h1>

                    <div class="div_caixa">
                        <div class="div_caixaEstatica">
                            <i class="bi bi-bookmark-plus"></i>
                            <h2 id="lista_usuario">12</h2>
                            <span
                                >ADICIONADOS A
                                <span class="queroLink">LISTA</span>
                            </span>
                        </div>

                        <div class="div_caixaEstatica">
                            <i class="bi bi-heart"></i>
                            <h2 id="favoritos_usuario">12</h2>
                            <span>FILMES FAVORITOS</span>
                        </div>

                        <div class="div_caixaEstatica">
                          <i class="bi bi-question-circle"></i>
                            <h2>2</h2>
                            <span>QUIZES RESPONDIDOS</span>
                        </div>

                        <div class="div_caixaEstatica">
                          <i class="bi bi-star"></i>
                            <h2 id="avaliacoes_usuario">8</h2>
                            <span>FILMES AVALIADOS</span>
                        </div>
                    </div>
                </div>

                <div class="div_filmeAvaliados">
                    <div class="div_txtFilmesAvailiados">
                        <h1>FILMES MAIS BEM AVALIADOS</h1>

                        <a href="">VER TODAS</a>
                    </div>

                    <div class="div_filmes">

                    </div>
                </div>
            </div>
        </div>
    </body>
</html>

<script src="./JS/perfil.js"></script>
<script src="./JS/global.js"></script>
