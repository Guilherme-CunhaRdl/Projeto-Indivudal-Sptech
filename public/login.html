<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="stylesheet" href="./css/login.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        />
        <title>Login - Biblioteca do Howl</title>

        <script src="./js/sessao.js"></script>
    </head>

    <body>
        <div class="div_container">
            <div class="div_esquerda">
                <a href="index.html" class="btn_voltar">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>
                <h1 class="titulo">- LOGIN -</h1>

                <div class="inputBox">
                    <input type="email" placeholder="E-MAIL" id="email_input" />
                    <span class="icon"><i class="bi bi-person"></i></span>
                </div>

                <div class="inputBox">
                    <input type="password" placeholder="SENHA" id="senha_input" />
                    <span class="icon"><i class="bi bi-eye"></i></span>
                </div>

                <button class="btn_entrar" onclick="entrar()">ENTRAR</button>

                <p>
                    Não tem uma conta?
                    <a href="cadastro.html">Crie uma agora!</a>
                </p>
            </div>

            <div class="div_direita">
                <img src="./assets/totoroSorriso.png" class="totoro" alt="" />
            </div>
        </div>
    </body>
</html>

<script>
    function entrar() {
     

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            console.log('Campos Vazios')
            finalizarAguardar();
            return false;
        } else {
            setInterval(sumirMensagem, 5000);
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar,
            }),
        })
            .then(function (resposta) {
                console.log("ESTOU NO THEN DO entrar()!");

                if (resposta.ok) {
                    console.log(resposta);

                    resposta.json().then((json) => {
                        console.log(json);
                        console.log(JSON.stringify(json));
                        sessionStorage.EMAIL_USUARIO = json.email;
                        sessionStorage.NOME_USUARIO = json.nome;
                        sessionStorage.ID_USUARIO = json.id;

                        setTimeout(function () {
                            window.location = "index.html";
                        }, 1000); // apenas para exibir o loading
                    });
                } else {
                    console.log("Houve um erro ao tentar realizar o login!");

                    resposta.text().then((texto) => {
                        console.error(texto);
                        finalizarAguardar(texto);
                    });
                }
            })
            .catch(function (erro) {
                console.log(erro);
            });

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none";
    }
</script>
