<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./css/cadastro.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        />

        <title>Cadastro - Biblioteca do Howl</title>

        <script src="./js/sessao.js"></script>

        <link rel="stylesheet" href="./css/estilo.css" />
        <link rel="icon" href="./assets/icon/favicon2.ico" />
        <link rel="preconnect" href="https://fonts.gstatic.com" />
    </head>

    <body onload="listar()">
        <div class="div_container">
            <div class="div_esquerda">
                <a href="index.html" class="btn_voltar">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>
                <h1 class="titulo">- CADASTRO -</h1>

                <div class="inputBox foto">
                    <label for="iptFoto" class="custom-file"
                        ><input type="file" id="iptFoto"
                    /></label>
                </div>

                <div class="inputBox">
                    <input
                        type="text"
                        placeholder="USUARIO*"
                        id="nome_input"
                        class="ipt_cadastro"
                        oninput="validarNome()"
                    />
                    <p class="msg_erro" id="ipt_nomeErro"></p>
                </div>

                <div class="inputBox">
                    <input
                        type="email"
                        placeholder="E-MAIL*"
                        id="email_input"
                        class="ipt_cadastro"
                        oninput="validarEmail()"
                    />

                    <p class="msg_erro" id="ipt_emailErro"></p>
                </div>

                <div class="inputBox">
                    <input
                        type="password"
                        placeholder="SENHA*"
                        id="senha_input"
                        class="ipt_cadastro"
                        oninput="validarSenha()"
                    />
                    <p class="msg_erro" id="ipt_senhaErro"></p>
                </div>

                <div class="inputBox">
                    <input
                        type="password"
                        placeholder="CONFIRMAR SENHA*"
                        id="confirmacao_senha_input"
                        class="ipt_cadastro"
                        oninput="validarSenha()"
                    />
                    <p class="msg_erro" id="ipt_confirmarSenhaErro"></p>
                </div>

                <button class="btn_entrar" onclick="cadastrar()">
                    CRIAR CONTA
                </button>

                <p class="P_possuiConta">
                    Ja possui uma conta? <a href="login.html">Entre agora!</a>
                </p>
            </div>

            <div class="div_direita">
                <img
                    src="./assets/casteloAnimadoFundo.png"
                    class="CasteloAnimado"
                    alt=""
                />
            </div>
        </div>
    </body>
    <script src="./JS/validarCadastro.js"></script>
</html>
